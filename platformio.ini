; galactic-unicorn-pad — Elecrow CrowPanel 7" (ESP32-S3-WROOM-1-N4R8)
; 据え置きタッチコントローラー for galactic-unicorn-leg LED board
;
; Board notes:
;   - 4MB Flash, 8MB OCTAL PSRAM -> memory_type = qio_opi is MANDATORY.
;     Wrong setting => heap_caps_malloc(SPIRAM) fails => framebuffer alloc
;     fails => boot crash.
;   - 800x480 RGB parallel panel (driven via Arduino_GFX RGB panel).
;   - GT911 capacitive touch on I2C (SDA=19, SCL=20).

[env:crowpanel-7]
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1          ; generic S3 base; actual pins in include/board_pins.h
framework = arduino
monitor_speed = 115200
upload_speed = 460800              ; CH340 unreliable at 921600 on this board

; --- N4R8: 4MB flash + 8MB OCTAL PSRAM ---
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_upload.flash_size = 4MB
board_build.partitions = partitions_4mb.csv

build_flags =
  -DBOARD_HAS_PSRAM
  ; Serial -> UART0 (CH340 / the USB-serial port). Native USB-CDC is NOT usable
  ; on this board: ESP32-S3's native USB pins (GPIO19/20) are wired to the GT911
  ; touch I2C bus, so CDC=1 sends all Serial output into a dead port.
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_LVGL_H_INCLUDE_SIMPLE          ; generated font .c files use #include "lvgl.h"
  -I include                         ; lv_conf.h, board_pins.h, app_config.h
  -I src                             ; allow "net/...", "model/..." style includes
  -DCORE_DEBUG_LEVEL=3

lib_deps =
  lvgl/lvgl@^8.3.11
  ; 1.3.x: last series before Arduino_GFX requires arduino-esp32 3.x
  ; (esp32-hal-periman.h). Pin here to stay compatible with espressif32@6.x.
  moononournation/GFX Library for Arduino@~1.3.9
  bblanchon/ArduinoJson@^7.2.0
  ; TAMC_GT911 is vendored in lib/TAMC_GT911 with a local patch to reset()
  ; (skips the unwired INT/RST on this board). Do NOT re-add the registry dep,
  ; or it will double-link against the vendored copy.
